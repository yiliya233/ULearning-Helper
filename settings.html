<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>ULearning Helper — 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #fafafa;
      color: #000;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 520px; margin: 40px auto; padding: 0 20px; }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .sub { font-size: 12px; color: #999; margin-bottom: 28px; }

    /* --- Card --- */
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .card-head {
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      border-bottom: 1px solid #eee;
      background: #fafafa;
    }
    .card-body { padding: 16px; }

    /* --- Fields --- */
    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .field input {
      width: 100%;
      height: 34px;
      padding: 0 10px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      background: #fff;
      color: #000;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.12); }
    .field input::placeholder { color: #ccc; }

    /* --- Buttons --- */
    .btn {
      height: 34px;
      padding: 0 16px;
      border: 1px solid #d0d0d0;
      background: #fff;
      color: #333;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      border-radius: 8px;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn:hover { background: #f5f5f5; border-color: #bbb; }
    .btn:active { background: #e8e8e8; }
    .btn:disabled { opacity: 0.3; cursor: default; }
    .btn-primary { background: #333; color: #fff; border-color: #333; }
    .btn-primary:hover { background: #444; border-color: #444; }
    .btn-sm { height: 28px; padding: 0 10px; font-size: 11px; }
    .btn-group { display: flex; gap: 8px; }
    .btn-group .btn { flex: 1; }
    .btn-row { margin-top: 12px; display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }

    /* --- Status --- */
    .msg {
      margin-top: 8px;
      padding: 8px 12px;
      font-size: 11px;
      border-radius: 8px;
      display: none;
    }
    .msg.show { display: block; }
    .msg.ok { background: #f0f0f0; color: #333; }
    .msg.err { background: #fff0f0; color: #900; }

    /* --- Log --- */
    .log-box {
      height: 300px;
      overflow-y: auto;
      background: #111;
      color: #aaa;
      font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
      font-size: 11px;
      line-height: 1.6;
      padding: 10px 12px;
      border-radius: 0 0 12px 12px;
    }
    .log-box::-webkit-scrollbar { width: 4px; }
    .log-box::-webkit-scrollbar-thumb { background: #444; }
    .log-box .ok { color: #7ec699; }
    .log-box .err { color: #cc7832; }
    .log-box .info { color: #6ca0dc; }

    .log-actions {
      display: flex;
      gap: 8px;
      padding: 8px 0;
    }

    /* --- Warning --- */
    .warn {
      font-size: 11px;
      color: #999;
      margin-bottom: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ULearning Helper</h1>
    <p class="sub">设置</p>

    <!-- API -->
    <div class="card">
      <div class="card-head">API 配置</div>
      <div class="card-body">
        <div class="field"><label>API 地址</label><input id="apiUrl" placeholder="https://api.openai.com/v1/chat/completions"></div>
        <div class="field"><label>API Key</label><input id="apiKey" type="password" placeholder="sk-..."></div>
        <div class="field"><label>模型</label><input id="model" placeholder="gpt-4o-mini"></div>
        <div class="btn-row">
          <button class="btn btn-primary" id="saveBtn">保存配置</button>
          <button class="btn" id="testBtn">测试连接</button>
        </div>
        <div class="msg" id="apiMsg"></div>
      </div>
    </div>

    <!-- 选择器 -->
    <div class="card">
      <div class="card-head">选择器</div>
      <div class="card-body">
        <p class="warn">仅在默认选择器无法识别题目时修改。点击「检测」查看匹配情况。</p>
        <div class="field"><label>题目容器</label><input id="selQ" placeholder=".question-item"></div>
        <div class="field"><label>题目文本</label><input id="selQt" placeholder=".question-title"></div>
        <div class="field"><label>选项列表</label><input id="selOpt" placeholder=".answer-area label, .choice-list label"></div>
        <div class="field"><label>填空输入</label><input id="selBlank" placeholder="input[type='text']"></div>
        <div class="field"><label>简答文本域</label><input id="selEssay" placeholder="textarea"></div>
        <div class="field"><label>提交按钮</label><input id="selSubmit" placeholder="button.submit-button"></div>
        <div class="btn-row">
          <button class="btn btn-sm" id="selSave">保存</button>
          <button class="btn btn-sm" id="selReset">恢复默认</button>
          <button class="btn btn-sm" id="selInspect">检测</button>
        </div>
        <div class="msg" id="selMsg"></div>
      </div>
    </div>

    <!-- 日志 -->
    <div class="card">
      <div class="card-head">日志</div>
      <div class="log-box" id="logBox"></div>
      <div class="log-actions" style="padding: 8px 16px;">
        <button class="btn btn-sm" id="logClear">清空</button>
        <button class="btn btn-sm" id="logRefresh">刷新</button>
      </div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
